<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="200" height="130">
  <defs>
    <radialGradient id="globeGrad" cx="48%" cy="42%" r="58%" fx="45%" fy="38%">
      <stop offset="0%"   stop-color="#e8d44d"/>
      <stop offset="30%"  stop-color="#c9b820"/>
      <stop offset="65%"  stop-color="#a89800"/>
      <stop offset="100%" stop-color="#7a6e00"/>
    </radialGradient>
    <!-- Clip exactly matches the gold fill ellipse -->
    <clipPath id="globeClip">
      <ellipse cx="100" cy="65" rx="86" ry="54"/>
    </clipPath>
  </defs>

  <!-- Black outer border ellipse -->
  <ellipse cx="100" cy="65" rx="93" ry="60" fill="#111111"/>
  <!-- Gold fill ellipse — slightly smaller than clip so stroke doesn't bleed -->
  <ellipse cx="100" cy="65" rx="86" ry="54" fill="url(#globeGrad)"/>

  <!-- Grid lines — all drawn inside clip -->
  <g clip-path="url(#globeClip)" fill="none" stroke="#111111" stroke-width="3.2">
    <!-- Longitude arcs through top pole (100,11) and bottom pole (100,119) -->
    <path d="M100,11 C62,32 42,52 42,65 C42,78 62,98 100,119"/>
    <path d="M100,11 C80,32 72,52 72,65 C72,78 80,98 100,119"/>
    <line x1="100" y1="11" x2="100" y2="119"/>
    <path d="M100,11 C120,32 128,52 128,65 C128,78 120,98 100,119"/>
    <path d="M100,11 C138,32 158,52 158,65 C158,78 138,98 100,119"/>

    <!-- Latitude lines — ellipses whose rx is computed from the oblate sphere equation -->
    <!-- At y=38: fraction = (65-38)/54 = 0.5 up from equator; rx = 86*sin(arccos(0.5)) ≈ 74 -->
    <ellipse cx="100" cy="38" rx="74"  ry="7"/>
    <!-- At y=52: fraction = 13/54 ≈ 0.24; rx ≈ 84 -->
    <ellipse cx="100" cy="52" rx="84"  ry="6"/>
    <!-- Equator -->
    <ellipse cx="100" cy="65" rx="86"  ry="5"/>
    <!-- At y=78 (mirror of 52) -->
    <ellipse cx="100" cy="78" rx="84"  ry="6"/>
    <!-- At y=92 (mirror of 38) -->
    <ellipse cx="100" cy="92" rx="74"  ry="7"/>
  </g>

  <!-- Black border ring redrawn on top to cleanly cap any stroke overflow -->
  <ellipse cx="100" cy="65" rx="93" ry="60" fill="none" stroke="#111111" stroke-width="6"/>
  <!-- Inner crisp edge matching the gold ellipse -->
  <ellipse cx="100" cy="65" rx="86" ry="54" fill="none" stroke="#111111" stroke-width="3"/>
</svg>
